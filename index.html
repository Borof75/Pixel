<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Медицинский портал | Отправка отчётов</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
    }

    body {
      background: #f5f0f0;
      background-image:
        linear-gradient(rgba(200, 40, 40, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200, 40, 40, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Segoe UI", "Roboto", system-ui, sans-serif;
      padding: 20px;
      color: #2c2c2c;
    }

    .card {
      background: #ffffff;
      border-radius: 32px;
      box-shadow:
        0 20px 40px rgba(180, 30, 30, 0.15),
        0 4px 12px rgba(0, 0, 0, 0.05);
      width: 100%;
      max-width: 820px;
      padding: 32px 28px 36px;
      border: 1px solid #ffcdcd;
    }

    h1 {
      font-weight: 700;
      font-size: 2.1rem;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 3px solid #e63946;
      padding-bottom: 20px;
      color: #a4161a;
      flex-wrap: wrap;
    }

    h1 .med-icon {
      background: #e63946;
      color: white;
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
    }

    .badge {
      background: #ffe6e6;
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 0.85rem;
      color: #b11d1d;
      font-weight: 700;
      border: 1px solid #f3b3b3;
    }

    .secure-badge {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff5f5;
      padding: 14px 22px;
      border-radius: 20px;
      margin: 20px 0 24px;
      border-left: 6px solid #e63946;
      color: #a4161a;
      font-weight: 600;
      box-shadow: 0 2px 6px rgba(230, 57, 70, 0.1);
    }

    .secure-badge span:first-child {
      font-size: 1.8rem;
    }

    .selector-area {
      margin-bottom: 30px;
    }

    .selector-area label {
      display: block;
      margin-bottom: 10px;
      font-weight: 700;
      color: #a4161a;
      text-transform: uppercase;
      font-size: 0.9rem;
      letter-spacing: 0.8px;
    }

    select {
      width: 100%;
      padding: 16px 22px;
      background: #ffffff;
      border: 2px solid #e0b3b3;
      border-radius: 20px;
      font-size: 1.1rem;
      font-weight: 500;
      color: #2c2c2c;
      cursor: pointer;
      outline: none;
      appearance: none;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><path fill="%23e63946" d="M7 10l5 5 5-5z"/></svg>');
      background-repeat: no-repeat;
      background-position: right 22px center;
      background-size: 22px;
      transition: 0.2s;
    }

    select:hover {
      border-color: #e63946;
      background-color: #fffbfb;
    }

    select:focus {
      border-color: #e63946;
      box-shadow: 0 0 0 4px rgba(230, 57, 70, 0.15);
    }

    .form-container {
      background: #fefbfb;
      border-radius: 28px;
      padding: 24px 22px 22px;
      border: 1px solid #f0c0c0;
      margin-bottom: 30px;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
    }

    .dynamic-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field-group label {
      font-size: 0.95rem;
      font-weight: 700;
      color: #a4161a;
      letter-spacing: 0.2px;
      margin-left: 6px;
    }

    .field-group input,
    .field-group textarea,
    .field-group select {
      background: #ffffff;
      border: 2px solid #e6c3c3;
      border-radius: 18px;
      padding: 14px 20px;
      font-size: 1rem;
      color: #1e1e1e;
      outline: none;
      transition: all 0.2s;
      font-family: inherit;
      resize: vertical;
    }

    .field-group textarea {
      min-height: 110px;
    }

    .field-group input:focus,
    .field-group textarea:focus,
    .field-group select:focus {
      border-color: #e63946;
      box-shadow: 0 0 0 4px rgba(230, 57, 70, 0.1);
      background: #fffafa;
    }

    .field-group input::placeholder,
    .field-group textarea::placeholder {
      color: #b99a9a;
      font-weight: 300;
    }

    .action-bar {
      display: flex;
      justify-content: flex-end;
      gap: 18px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      background: #ffffff;
      border: none;
      padding: 16px 32px;
      border-radius: 48px;
      font-weight: 700;
      font-size: 1.1rem;
      color: #a4161a;
      border: 2px solid #e0b3b3;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 8px rgba(0,0,0,0.03);
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .btn-primary {
      background: #e63946;
      border: 2px solid #e63946;
      color: white;
      box-shadow: 0 10px 18px rgba(230, 57, 70, 0.25);
      flex: 1;
      justify-content: center;
    }

    .btn-primary:hover {
      background: #c72e3b;
      border-color: #c72e3b;
      transform: scale(1.01);
      box-shadow: 0 12px 22px rgba(200, 40, 50, 0.3);
    }

    .btn-secondary {
      background: white;
      border: 2px solid #d49b9b;
      color: #8b3a3a;
    }

    .btn-secondary:hover {
      background: #fff0f0;
      border-color: #e63946;
    }

    .status {
      margin-top: 26px;
      padding: 16px 22px;
      border-radius: 48px;
      background: #fef6f6;
      text-align: center;
      font-weight: 600;
      color: #a4161a;
      border-left: 8px solid #e63946;
      font-size: 1rem;
      word-break: break-word;
      box-shadow: 0 2px 8px rgba(230,57,70,0.08);
    }

    .footnote {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-top: 16px;
      text-align: right;
      color: #7a5a5a;
      font-style: italic;
    }

    @media (max-width: 600px) {
      .card {
        padding: 24px 18px 28px;
        border-radius: 24px;
      }

      h1 {
        font-size: 1.55rem;
      }

      .btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>

            "student"
          ]
        },

        9: {
          username: "Медицинский портал",
          author: "Медицинский корпус | Проверка дефектности",
          title: "Дефектность — заключение",
          description: "Результаты проверки были зарегистрированы.",
          footer: "Медицинский портал | Проверка дефектности",
          color: 0xf9a825,
          colorBy: "result",
          layout: [
            "commission",
            ["date", "target"],
            "psychResult",
            ["externalMutations", "internalMutations"],
            "brainMutations",
            "result"
          ]
        },

        10: {
          username: "Медицинский портал",
          author: "Медицинский корпус | Постановление проверки",
          title: "Дефектность — постановление",
          description: "Постановление о назначении проверки было зарегистрировано.",
          footer: "Медицинский портал | Проверка дефектности",
          color: 0xc62828,
          layout: [
            "commission",
            ["date", "checkType"],
            "target",
            "reason",
            "description"
          ]
        },

        11: {
          username: "Медицинский портал",
          author: "Медицинский корпус | Наборная деятельность",
          title: "Рапорт о наборной деятельности",
          description: "Отчёт о наборной активности был зарегистрирован.",
          footer: "Медицинский портал | Наборная отчётность",
          color: 0x2e7d32,
          layout: [
            "reporter",
            ["date", "activity"],
            "participants",
            "interviewTarget"
          ]
        }
      };

      /* =========================================================
         5. DOM
         ========================================================= */

      const formSelector = document.getElementById("formSelector");
      const dynamicFormDiv = document.getElementById("dynamicForm");
      const statusDiv = document.getElementById("statusMessage");
      const sendBtn = document.getElementById("sendBtn");
      const clearBtn = document.getElementById("clearBtn");

      /* =========================================================
         6. HELPERS
         ========================================================= */

      function sanitizeText(value, maxLength = 1000) {
        return String(value ?? "")
          .replace(/@everyone/g, "@\u200beveryone")
          .replace(/@here/g, "@\u200bhere")
          .replace(/<@&/g, "<@&\u200b")
          .replace(/<@/g, "<@\u200b")
          .trim()
          .slice(0, maxLength);
      }

      function getNowText() {
        return new Date().toLocaleString("ru-RU", {
          day: "2-digit",
          month: "2-digit",
          year: "numeric",
          hour: "2-digit",
          minute: "2-digit"
        });
      }

      function getColorByResult(result) {
        if (result === "Сдано") return 0x2e7d32;
        if (result === "Провалено") return 0xc62828;

        if (result === "Зеленая степень") return 0x2e7d32;
        if (result === "Желтая степень") return 0xf9a825;
        if (result === "Красная степень") return 0xc62828;

        if (result === "Победа ВАР") return 0x2e7d32;
        if (result === "Поражение ВАР") return 0xc62828;

        return null;
      }

      function getFieldConfig(formId, fieldName) {
        const fields = FIELDS_MAP[formId] || [];
        return fields.find((field) => field.name === fieldName);
      }

      function getLabel(formId, fieldName) {
        const config = getFieldConfig(formId, fieldName);
        return config ? config.label : fieldName;
      }

      function spacer() {
        return {
          name: "\u200B",
          value: "\u200B",
          inline: false
        };
      }

      function makeDiscordField(formId, fieldName, data, inline = false) {
        const label = getLabel(formId, fieldName);
        const value = data[fieldName];

        return {
          name: sanitizeText(label, 256),
          value: sanitizeText(value || "—", 1000),
          inline
        };
      }

      function buildHeader(title, subtitle) {
        return [
          `>>> **${title}**`,
          subtitle || "Отчёт зарегистрирован через медицинский портал.",
          "",
          `**Время регистрации:** ${getNowText()}`
        ].join("\n");
      }

      /* =========================================================
         7. RENDER FORM
         ========================================================= */

      function initSelector() {
        FORM_TYPES.forEach((form) => {
          const option = document.createElement("option");
          option.value = form.id;
          option.textContent = form.name;
          formSelector.appendChild(option);
        });
      }

      function renderFormById(formId) {
        const fields = FIELDS_MAP[formId] || [];

        if (!fields.length) {
          dynamicFormDiv.innerHTML = `<div style="padding:20px;text-align:center">Нет описания полей</div>`;
          return;
        }

        let html = "";

        fields.forEach((field) => {
          const requiredStar = field.required ? " *" : "";

          if (field.type === "textarea") {
            html += `
              <div class="field-group">
                <label>${field.label}${requiredStar}</label>
                <textarea name="${field.name}" placeholder="${field.placeholder || ""}" rows="${field.rows || 3}"></textarea>
              </div>
            `;
            return;
          }

          if (field.type === "select") {
            const optionsHtml = (field.options || [])
              .map((option) => `<option value="${option}">${option}</option>`)
              .join("");

            html += `
              <div class="field-group">
                <label>${field.label}${requiredStar}</label>
                <select name="${field.name}">${optionsHtml}</select>
              </div>
            `;
            return;
          }

          if (field.type === "date") {
            html += `
              <div class="field-group">
                <label>${field.label}${requiredStar}</label>
                <input type="date" name="${field.name}" />
              </div>
            `;
            return;
          }

          html += `
            <div class="field-group">
              <label>${field.label}${requiredStar}</label>
              <input type="text" name="${field.name}" placeholder="${field.placeholder || ""}" />
            </div>
          `;
        });

        dynamicFormDiv.innerHTML = html;
      }

      /* =========================================================
         8. COLLECT AND VALIDATE DATA
         ========================================================= */

      function collectFormData() {
        const formId = Number(formSelector.value);
        const fields = FIELDS_MAP[formId] || [];
        const data = {};

        fields.forEach((field) => {
          const element = dynamicFormDiv.querySelector(`[name="${field.name}"]`);

          if (!element) {
            data[field.name] = "";
            return;
          }

          let value = element.value;

          if (field.type === "date" && !value) {
            value = "не указана";
          }

          data[field.name] = sanitizeText(value || "—");
        });

        return data;
      }

      function validateRequired() {
        const formId = Number(formSelector.value);
        const fields = FIELDS_MAP[formId] || [];

        for (const field of fields) {
          if (!field.required) continue;

          const element = dynamicFormDiv.querySelector(`[name="${field.name}"]`);
          if (!element) continue;

          const value = element.value.trim();

          if (!value) {
            statusDiv.innerHTML = `Заполните обязательное поле: "${field.label}"`;
            element.focus();
            return false;
          }
        }

        return true;
      }

      /* =========================================================
         9. BUILD DISCORD EMBED
         ========================================================= */

      function buildFieldsFromLayout(formId, layout, data) {
        const fields = [];

        layout.forEach((item) => {
          if (Array.isArray(item)) {
            item.forEach((fieldName) => {
              fields.push(makeDiscordField(formId, fieldName, data, true));
            });

            fields.push(spacer());
            return;
          }

          fields.push(makeDiscordField(formId, item, data, false));
          fields.push(spacer());
        });

        if (fields.length && fields[fields.length - 1].name === "\u200B") {
          fields.pop();
        }

        return fields;
      }

      function buildPayload(formId, data) {
        const template = EMBED_TEMPLATES[formId];

        if (!template) {
          throw new Error("Не найден шаблон Discord-сообщения для выбранной формы.");
        }

        const dynamicColor = template.colorBy
          ? getColorByResult(data[template.colorBy])
          : null;

        return {
          username: template.username || "Медицинский портал",
          avatar_url: "https://i.imgur.com/q0zGBkE.png",
          allowed_mentions: {
            parse: []
          },
          embeds: [
            {
              author: {
                name: template.author,
                icon_url: "https://i.imgur.com/q0zGBkE.png"
              },
              title: template.title,
              description: buildHeader(template.title, template.description),
              color: dynamicColor || template.color || 0xb71c1c,
              fields: buildFieldsFromLayout(formId, template.layout, data),
              footer: {
                text: template.footer
              },
              timestamp: new Date().toISOString()
            }
          ]
        };
      }

      /* =========================================================
         10. ACTIONS
         ========================================================= */

      function clearFormFields() {
        const inputs = dynamicFormDiv.querySelectorAll("input, textarea, select");

        inputs.forEach((element) => {
          if (element.tagName === "SELECT") {
            element.selectedIndex = 0;
          } else {
            element.value = "";
          }
        });

        statusDiv.innerHTML = "Поля очищены.";
      }

      async function sendToWebhook() {
        const formId = Number(formSelector.value);
        const webhookUrl = WEBHOOK_SECRETS[formId];

        if (!webhookUrl || webhookUrl === "PASTE_WEBHOOK_HERE") {
          statusDiv.innerHTML = "Для этой формы не указан webhook.";
          return;
        }

        if (!validateRequired()) return;

        const formData = collectFormData();
        const payload = buildPayload(formId, formData);
        const formName = FORM_TYPES.find((form) => form.id === formId)?.name || "Отчёт";

        statusDiv.innerHTML = "Отправка отчёта...";
        sendBtn.disabled = true;
        sendBtn.style.opacity = "0.7";
        sendBtn.style.cursor = "not-allowed";

        try {
          const response = await fetch(webhookUrl, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            const text = await response.text();
            throw new Error(`HTTP ${response.status}: ${text}`);
          }

          statusDiv.innerHTML = `Отчёт «${formName}» успешно отправлен. ${getNowText()}`;
        } catch (error) {
          console.error(error);
          statusDiv.innerHTML = `Ошибка отправки: ${error.message}`;
        } finally {
          sendBtn.disabled = false;
          sendBtn.style.opacity = "1";
          sendBtn.style.cursor = "pointer";
        }
      }

      /* =========================================================
         11. INIT
         ========================================================= */

      function init() {
        initSelector();

        formSelector.value = "1";
        renderFormById(1);

        formSelector.addEventListener("change", (event) => {
          const formId = Number(event.target.value);
          renderFormById(formId);
          statusDiv.innerHTML = "Форма загружена. Заполните данные.";
        });

        clearBtn.addEventListener("click", clearFormFields);
        sendBtn.addEventListener("click", sendToWebhook);

        statusDiv.innerHTML = "Система готова.";
      }

      init();
    })();
  </script>
</body>
</html>

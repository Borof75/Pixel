<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>🏥 Медицинский портал | Отправка отчётов</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
    }
    body {
      background: #f5f0f0;
      background-image: 
        linear-gradient(rgba(200, 40, 40, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200, 40, 40, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
      padding: 20px;
      margin: 0;
    }
    .card {
      background: #ffffff;
      border-radius: 32px;
      box-shadow: 0 20px 40px rgba(180, 30, 30, 0.15), 0 4px 12px rgba(0, 0, 0, 0.05);
      width: 100%;
      max-width: 800px;
      padding: 32px 28px 36px;
      transition: all 0.2s;
      color: #2c2c2c;
      border: 1px solid #ffcdcd;
    }
    h1 {
      font-weight: 600;
      font-size: 2.2rem;
      letter-spacing: -0.5px;
      margin: 0 0 8px 0;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 3px solid #e63946;
      padding-bottom: 20px;
      color: #a4161a;
    }
    h1 .med-icon {
      background: #e63946;
      color: white;
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
    }
    .secure-badge {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff5f5;
      padding: 14px 22px;
      border-radius: 20px;
      margin: 20px 0 24px;
      border-left: 6px solid #e63946;
      color: #a4161a;
      font-weight: 500;
      box-shadow: 0 2px 6px rgba(230, 57, 70, 0.1);
    }
    .secure-badge span:first-child {
      font-size: 1.8rem;
    }
    .selector-area {
      margin-bottom: 30px;
    }
    .selector-area label {
      display: block;
      margin-bottom: 10px;
      font-weight: 600;
      color: #a4161a;
      text-transform: uppercase;
      font-size: 0.9rem;
      letter-spacing: 0.8px;
    }
    select {
      width: 100%;
      padding: 16px 22px;
      background: #ffffff;
      border: 2px solid #e0b3b3;
      border-radius: 20px;
      font-size: 1.1rem;
      font-weight: 500;
      color: #2c2c2c;
      cursor: pointer;
      outline: none;
      appearance: none;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><path fill="%23e63946" d="M7 10l5 5 5-5z"/></svg>');
      background-repeat: no-repeat;
      background-position: right 22px center;
      background-size: 22px;
      transition: 0.2s;
    }
    select:hover {
      border-color: #e63946;
      background-color: #fffbfb;
    }
    select:focus {
      border-color: #e63946;
      box-shadow: 0 0 0 4px rgba(230, 57, 70, 0.15);
    }
    .form-container {
      background: #fefbfb;
      border-radius: 28px;
      padding: 24px 22px 22px;
      border: 1px solid #f0c0c0;
      margin-bottom: 30px;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
    }
    .dynamic-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .field-group label {
      font-size: 0.95rem;
      font-weight: 600;
      color: #a4161a;
      letter-spacing: 0.2px;
      margin-left: 6px;
    }
    .field-group input, .field-group textarea, .field-group select {
      background: #ffffff;
      border: 2px solid #e6c3c3;
      border-radius: 18px;
      padding: 14px 20px;
      font-size: 1rem;
      color: #1e1e1e;
      outline: none;
      transition: all 0.2s;
      font-family: inherit;
      resize: vertical;
    }
    .field-group textarea {
      min-height: 110px;
    }
    .field-group input:focus, .field-group textarea:focus, .field-group select:focus {
      border-color: #e63946;
      box-shadow: 0 0 0 4px rgba(230, 57, 70, 0.1);
      background: #fffafa;
    }
    .field-group input::placeholder, .field-group textarea::placeholder {
      color: #b99a9a;
      font-weight: 300;
    }
    .row-2col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .action-bar {
      display: flex;
      justify-content: flex-end;
      gap: 18px;
      align-items: center;
      flex-wrap: wrap;
    }
    .btn {
      background: #ffffff;
      border: none;
      padding: 16px 32px;
      border-radius: 48px;
      font-weight: 700;
      font-size: 1.1rem;
      color: #a4161a;
      border: 2px solid #e0b3b3;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 8px rgba(0,0,0,0.03);
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .btn-primary {
      background: #e63946;
      border: 2px solid #e63946;
      color: white;
      box-shadow: 0 10px 18px rgba(230, 57, 70, 0.25);
      flex: 1;
      justify-content: center;
    }
    .btn-primary:hover {
      background: #c72e3b;
      border-color: #c72e3b;
      transform: scale(1.01);
      box-shadow: 0 12px 22px rgba(200, 40, 50, 0.3);
    }
    .btn-secondary {
      background: white;
      border: 2px solid #d49b9b;
      color: #8b3a3a;
    }
    .btn-secondary:hover {
      background: #fff0f0;
      border-color: #e63946;
    }
    .status {
      margin-top: 26px;
      padding: 16px 22px;
      border-radius: 48px;
      background: #fef6f6;
      text-align: center;
      font-weight: 500;
      color: #a4161a;
      border-left: 8px solid #e63946;
      font-size: 1rem;
      word-break: break-word;
      box-shadow: 0 2px 8px rgba(230,57,70,0.08);
    }
    .badge {
      background: #ffe6e6;
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 0.85rem;
      color: #b11d1d;
      font-weight: 600;
      border: 1px solid #f3b3b3;
    }
    .footnote {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-top: 16px;
      text-align: right;
      color: #7a5a5a;
      font-style: italic;
    }
    .cross-icon {
      background: #e63946;
      color: white;
      border-radius: 30px;
      padding: 4px 10px;
      font-size: 1rem;
    }
  </style>
</head>
<body>
<div class="card">
  <h1>
    <span class="med-icon">🏥</span> 
    МЕДИЦИНСКИЙ ПОРТАЛ
    <span class="badge">🔒 защищённый канал</span>
  </h1>

  <!-- Индикатор безопасности (вместо поля ввода) -->
  <div class="secure-badge">
    <span>🩺</span> 
    <span>На случай отказа гугл форм.</span>
  </div>

  <!-- Выбор формы -->
  <div class="selector-area">
    <label>📋 ВЫБЕРИТЕ ТИП ОТЧЁТА</label>
    <select id="formSelector"></select>
  </div>

  <!-- Динамическая форма -->
  <div class="form-container">
    <div id="dynamicForm" class="dynamic-form">
      <!-- поля генерируются здесь -->
    </div>
  </div>

  <!-- Кнопки действий -->
  <div class="action-bar">
    <button class="btn btn-primary" id="sendBtn">📤 Отправить отчёт</button>
    <button class="btn btn-secondary" id="clearBtn">🧽 Сбросить</button>
  </div>
  
  <!-- Статус -->
  <div class="status" id="statusMessage">
    ⚕️ Готов к работе. Выберите форму и заполните данные.
  </div>
  <div class="footnote">* Данные передаются по защищённым вебхукам (скрыто).</div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- 🔒 СКРЫТЫЕ URL ВЕБХУКОВ (ЗАМЕНИТЕ НА РЕАЛЬНЫЕ) ----------
    const WEBHOOK_SECRETS = {
      1: "https://discord.com/api/webhooks/1429875891625791611/1HPEvEBWlz2TPC_CsTFwnsvjQQyR_Nryvo8xUeFsSTiQmnOaVfECnP2iianPVABhSEWJ",
      2: "https://discord.com/api/webhooks/1429878446481477793/YsjcpXJ1-z1ZM91XjxjcGzPZGU5HFCvlh_eWQsrG8M-7kYqRm9C053uRcAi9KBnRkTkf",
      3: "https://discord.com/api/webhooks/1429876752225796209/EOxg9VZKW4nUwYTLWrlPCTFTxudtcDGeXKnOOefFRouaJrs3G2Gv5VN5NTecAQ-L5EzA",
      4: "https://discord.com/api/webhooks/1430604784867475606/p97IdpUWXjsQJ4X5Pdw_E9IBKdYSONMOqw-XkaMWUCJOITMf9gGJZR7eru2mEiBYan-m",
      5: "https://discord.com/api/webhooks/1429877985309098046/BNmOmrSigiNmklkwl3E0KLXSIpl1A0NJ_6J8crr_VXa_67_rbSQypaGibiNS4Or0nSW7",
      6: "https://discord.com/api/webhooks/1429879017208811520/jtN0WgGmmvPtr56hOJ0j_4jqDdhbw7wS5S6ta5fJUTVxE237gHWuVddtkp0K6yz7F904",
      7: "https://discord.com/api/webhooks/1429879217213931580/pi4uRULhSymgHJTXhOfCMfa9VmwpVviOSPZ0hL_AZWhiNq46KewPEREp4GMjd2dCj8Du",
      8: "https://discord.com/api/webhooks/1429879430506872893/4tHwOILaSC7s_urVBjGtlfWWFtgCJaHq2Rd_5WjY4oODtQPaaV0ohJS2G2-kDBoFBBDF",
      9: "https://discord.com/api/webhooks/1352654798765432921/замените_на_реальный_url_для_предложений",
      10: "https://discord.com/api/webhooks/1352654798765432922/замените_на_реальный_url_для_дефектности"
    };

    // ---------- КОНФИГУРАЦИЯ ФОРМ ----------
    const FORM_TYPES = [
      { id: 1, name: '[1] Форма запроса на Отпуск' },
      { id: 2, name: '[2] Форма отчетов Взысканий' },
      { id: 3, name: '[3] Форма отчетов Мед.Комиссия' },
      { id: 4, name: '[4] Форма отчетов Дежурства' },
      { id: 5, name: '[5] Форма отчетов Мед.Деятельности' },
      { id: 6, name: '[6] Форма отчетов Тренировок' },
      { id: 7, name: '[7] Форма отчетов Спец.Операций' },
      { id: 8, name: '[8] Форма отчетов Лекций/Зачетов/Практик' },
    ];

    // Поля (медицинский акцент в некоторых названиях)
    const FIELDS_MAP = {
      1: [ 
        { name: 'fullName', label: 'Докладывает', type: 'text', placeholder: 'Н|П|З', required: true },
        { name: 'startDate', label: 'Дата начала отпуска', type: 'date', required: true },
        { name: 'endDate', label: 'Дата окончания', type: 'date', required: true },
        { name: 'reason', label: 'Причина', type: 'textarea', placeholder: '...', rows: 2 }
      ],
      2: [ 
        { name: 'employee', label: 'Докладывает', type: 'text', required: true },
        { name: 'department', label: 'Нарушитель', type: 'text', required: true },
        { name: 'violation', label: 'Нарушение', type: 'text', required: true },
        { name: 'penaltyType', label: 'Вид взыскания', type: 'select', options: ['Взыскание'], required: true },
        { name: 'date', label: 'Дата', type: 'date', required: true },
        { name: 'details', label: 'Суть наказания', type: 'textarea', rows: 2 }
      ],
      3: [ 
        { name: 'doctor1', label: 'Докладывает боец', type: 'text' },
        { name: 'doctor2', label: 'Провел  медицинскую комиссию следующему бойцу', type: 'text' },
        { name: 'doctor3', label: 'Проверка знаний', type: 'text' },
        { name: 'doctor4', label: 'Хронические заболевания', type: 'text' },
        { name: 'doctor5', label: 'Протезы/Импланты', type: 'text' },
        { name: 'doctor6', label: 'Рост', type: 'text' },
        { name: 'doctor7', label: 'Вес', type: 'text' },
        { name: 'doctor8', label: 'Цвет глаз и реакция на свет', type: 'text' },
        { name: 'doctor9', label: 'Способность к физическим нагрузкам', type: 'text' },
        { name: 'doctor10', label: 'Кожный Покров', type: 'text' },
        { name: 'doctor11', label: 'Итог', type: 'text' }
      ],
      4: [ 
        { name: 'shiftDate', label: 'Дата дежурства', type: 'date', required: true },
        { name: 'shiftLead', label: 'Разводящий', type: 'text', required: true },
        { name: 'shiftLead', label: 'Место дежурства', type: 'text', required: true },
        { name: 'personnel', label: 'Состав дежурства', type: 'textarea', placeholder: 'Перечислите НПЗ', rows: 2 },
        { name: 'incidents', label: 'Поручения', type: 'textarea', rows: 2 },
        { name: 'handover', label: 'Начало-Конец', type: 'text' }
      ],
      5: [ 
        { name: 'notes', label: 'Докладывает', type: 'text' },
        { name: 'penaltyType', label: 'Вид деятельности', type: 'select', options: ['Мед. помощь', 'Создание Мед.препаратов', 'Сбор ингр', 'Операция', 'Семинар', 'Внеплан осмотр', 'Плановый осмотр'], required: true },
        { name: 'notes', label: 'Описание деятельности', type: 'text' },
        { name: 'procedures', label: 'Участники', type: 'textarea', rows: 2 },
        { name: 'notes1', label: 'Примечания', type: 'text' }
      ],
      6: [ 
        { name: 'trainingName', label: 'Докладывает', type: 'text', required: true },
        { name: 'trainer', label: 'Название тренировки', type: 'text', required: true },
        { name: 'date', label: 'Дата проведения', type: 'date', required: true },
        { name: 'participants', label: 'Участники (кол-во / состав)', type: 'textarea', rows: 2 },
        { name: 'result', label: 'Суть тренировки', type: 'text' }
      ],
      7: [ 
        { name: 'operationCode', label: 'Название операции', type: 'text', required: true },
        { name: 'date', label: 'Дата', type: 'date', required: true },
        { name: 'commander', label: 'Командовал', type: 'text', required: true },
        { name: 'objective', label: 'Состав', type: 'textarea', rows: 2 },
        { name: 'outcome', label: 'Описание', type: 'textarea', rows: 2 },
        { name: 'status', label: 'Статус', type: 'select', options: ['Победа ВАР', 'Поражение ВАР'] }
      ],
      8: [ 
        { name: 'eventType', label: 'Тип', type: 'select', options: ['Лекция', 'Зачет', 'Практика'], required: true },
        { name: 'status', label: 'Название', type: 'select', options: ['Вступительное ознакомление', 'КОМ и ОСМ', 'Ведение Мед.Карт', 'Командование отрядом', 'Внештатные ситуации', 'Распределение и командование отрядом на СО', 'Курс Интернатуры', 'Курс Ординатуры', 'Курс Военфельдшера', 'Академия МК', 'Положение о несении дежурства', 'Положение о санитарной деятельности', 'Тест по "Устав МК"', 'Зачет по мед знаниям', 'Школа Командования отрядом', 'Операционная деятельность', 'Маневры и знания против Зергов', 'Зачёт по развёртыванию ВПГ'] },
        { name: 'lecturer', label: 'Проводящий', type: 'text', required: true },
        { name: 'date', label: 'Дата', type: 'date', required: true },
        { name: 'group', label: 'Номер лекции/практики', type: 'text' },
        { name: 'group', label: 'Проходящий', type: 'text' },
        { name: 'eventType1', label: 'Итог', type: 'select', options: ['Сдано', 'Провалено'], required: true }
      ],
    };

    // DOM элементы
    const formSelector = document.getElementById('formSelector');
    const dynamicFormDiv = document.getElementById('dynamicForm');
    const statusDiv = document.getElementById('statusMessage');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');

    // Заполнить селектор
    FORM_TYPES.forEach(ft => {
      const opt = document.createElement('option');
      opt.value = ft.id;
      opt.textContent = ft.name;
      formSelector.appendChild(opt);
    });

    function renderFormById(id) {
      const fields = FIELDS_MAP[id] || [];
      if (!fields.length) {
        dynamicFormDiv.innerHTML = `<div style="padding:20px;text-align:center">⚠️ Нет описания полей</div>`;
        return;
      }
      let html = '';
      for (let field of fields) {
        const requiredStar = field.required ? ' *' : '';
        if (field.type === 'textarea') {
          html += `<div class="field-group">
            <label>${field.label}${requiredStar}</label>
            <textarea name="${field.name}" placeholder="${field.placeholder || ''}" rows="${field.rows || 3}"></textarea>
          </div>`;
        } else if (field.type === 'select') {
          let optionsHtml = '';
          (field.options || []).forEach(opt => { optionsHtml += `<option value="${opt}">${opt}</option>`; });
          html += `<div class="field-group">
            <label>${field.label}${requiredStar}</label>
            <select name="${field.name}">${optionsHtml}</select>
          </div>`;
        } else if (field.type === 'date') {
          html += `<div class="field-group">
            <label>${field.label}${requiredStar}</label>
            <input type="date" name="${field.name}" value="">
          </div>`;
        } else if (field.type === 'number') {
          html += `<div class="field-group">
            <label>${field.label}${requiredStar}</label>
            <input type="number" name="${field.name}" placeholder="${field.placeholder || ''}">
          </div>`;
        } else { 
          html += `<div class="field-group">
            <label>${field.label}${requiredStar}</label>
            <input type="text" name="${field.name}" placeholder="${field.placeholder || ''}">
          </div>`;
        }
      }
      dynamicFormDiv.innerHTML = html;
    }

    formSelector.value = '1';
    renderFormById(1);

    formSelector.addEventListener('change', (e) => {
      renderFormById(parseInt(e.target.value));
    });

    function clearFormFields() {
      const inputs = dynamicFormDiv.querySelectorAll('input, textarea, select');
      inputs.forEach(el => {
        if (el.type === 'select-one') el.selectedIndex = 0;
        else if (el.type === 'date') el.value = '';
        else el.value = '';
      });
      statusDiv.innerHTML = '🧽 Поля очищены.';
    }
    clearBtn.addEventListener('click', clearFormFields);

    function collectFormData() {
      const fields = FIELDS_MAP[parseInt(formSelector.value)] || [];
      const data = {};
      fields.forEach(f => {
        const element = dynamicFormDiv.querySelector(`[name="${f.name}"]`);
        if (element) {
          let value = element.value;
          if (f.type === 'date' && value === '') value = 'не указана';
          data[f.name] = value || '(не заполнено)';
        } else {
          data[f.name] = '';
        }
      });
      return data;
    }

    function validateRequired() {
      const fields = FIELDS_MAP[parseInt(formSelector.value)] || [];
      for (let f of fields) {
        if (!f.required) continue;
        const el = dynamicFormDiv.querySelector(`[name="${f.name}"]`);
        if (!el) continue;
        const val = el.value.trim();
        if (!val) {
          statusDiv.innerHTML = `⚠️ Заполните обязательное поле: "${f.label}"`;
          el.focus();
          return false;
        }
      }
      return true;
    }

    async function sendToWebhook() {
      const formId = parseInt(formSelector.value);
      const webhookUrl = WEBHOOK_SECRETS[formId];
      
      if (!webhookUrl || webhookUrl.includes('замените_на_реальный_url')) {
        statusDiv.innerHTML = '❌ Ошибка: для этой формы не задан корректный вебхук (замените заглушку в коде).';
        return;
      }

      if (!validateRequired()) return;

      const formName = FORM_TYPES.find(ft => ft.id === formId)?.name || 'Неизвестная форма';
      const formData = collectFormData();
      
      let description = '';
      for (let [key, val] of Object.entries(formData)) {
        const fieldConfig = FIELDS_MAP[formId]?.find(f => f.name === key);
        const label = fieldConfig ? fieldConfig.label : key;
        description += `**${label}**: ${val}\n`;
      }

      const payload = {
        username: "🏥 Медицинский портал",
        avatar_url: "https://i.imgur.com/q0zGBkE.png", // красный крест / медицина
        embeds: [{
          title: `📋 ${formName}`,
          description: description || 'Нет данных',
          color: 15158332, // красный
          timestamp: new Date().toISOString(),
          footer: { text: '🔒 Защищённый канал · Медстатистика' }
        }]
      };

      statusDiv.innerHTML = '⏳ Отправка отчёта...';
      
      try {
        const response = await fetch(webhookUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        
        if (response.ok) {
          statusDiv.innerHTML = `✅ Отчёт «${formName}» успешно отправлен! (${new Date().toLocaleTimeString()})`;
        } else {
          const text = await response.text();
          throw new Error(`HTTP ${response.status}: ${text}`);
        }
      } catch (error) {
        console.error(error);
        statusDiv.innerHTML = `❌ Ошибка отправки: ${error.message}`;
      }
    }

    sendBtn.addEventListener('click', sendToWebhook);

    window.addEventListener('load', () => {
      statusDiv.innerHTML = '🩺 Система готова. Вебхуки скрыты в коде.';
    });

  })();
</script>
</body>
</html>

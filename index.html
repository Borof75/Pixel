      color: #2c2c2c;
      border: 1px solid #ffcdcd;

    h1 {

      font-size: 2.1rem;
      letter-spacing: -0.5px;
      margin: 0 0 8px 0;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 3px solid #e63946;
      padding-bottom: 20px;
      color: #a4161a;
      flex-wrap: wrap;
    }

    h1 .med-icon {
      background: #e63946;
      color: white;
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
    }

    .badge {
      background: #ffe6e6;
      padding: 6px 16px;

      font-size: 0.85rem;
      color: #b11d1d;
      font-weight: 600;
      border: 1px solid #f3b3b3;
    }

    .secure-badge {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff5f5;
      padding: 14px 22px;
      border-radius: 20px;
      margin: 20px 0 24px;
      border-left: 6px solid #e63946;
      color: #a4161a;
      font-weight: 500;
      box-shadow: 0 2px 6px rgba(230, 57, 70, 0.1);
    }

    .secure-badge span:first-child {
      font-size: 1.8rem;
    }

    .selector-area {
      margin-bottom: 30px;
    }

      display: block;
      margin-bottom: 10px;
      font-weight: 700;
      color: #a4161a;
      text-transform: uppercase;
      font-size: 0.9rem;
      letter-spacing: 0.8px;
    }

      border: 2px solid #e0b3b3;
      border-radius: 20px;
      font-size: 1.1rem;
      font-weight: 500;
      color: #2c2c2c;
      cursor: pointer;
      outline: none;
      appearance: none;

      background-position: right 22px center;
      background-size: 22px;
      transition: 0.2s;
    }

      border-color: #e63946;
      background-color: #fffbfb;
    }

    select:focus {
      border-color: #e63946;
      box-shadow: 0 0 0 4px rgba(230, 57, 70, 0.15);

      border-radius: 28px;
      padding: 24px 22px 22px;
      border: 1px solid #f0c0c0;
      margin-bottom: 30px;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);

    .dynamic-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field-group label {
      font-size: 0.95rem;
      font-weight: 700;
      color: #a4161a;
      letter-spacing: 0.2px;
      margin-left: 6px;
    }

    .field-group textarea,

      background: #ffffff;
      border: 2px solid #e6c3c3;
      border-radius: 18px;
      padding: 14px 20px;
      font-size: 1rem;
      color: #1e1e1e;
      outline: none;
      transition: all 0.2s;
      font-family: inherit;
      resize: vertical;
    }

    .field-group textarea {
      min-height: 110px;
    }

    .field-group input:focus,
    .field-group textarea:focus,
    .field-group select:focus {
      border-color: #e63946;
      box-shadow: 0 0 0 4px rgba(230, 57, 70, 0.1);
      background: #fffafa;
    }

    .field-group input::placeholder,
    .field-group textarea::placeholder {
      color: #b99a9a;
      font-weight: 300;
    }

    .action-bar {
      display: flex;
      justify-content: flex-end;
      gap: 18px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      background: #ffffff;
      border: none;
      padding: 16px 32px;
      border-radius: 48px;
      font-weight: 700;
      font-size: 1.1rem;
      color: #a4161a;
      border: 2px solid #e0b3b3;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 8px rgba(0,0,0,0.03);
      display: inline-flex;
      align-items: center;
      gap: 10px;

      background: #e63946;
      border: 2px solid #e63946;
      color: white;
      box-shadow: 0 10px 18px rgba(230, 57, 70, 0.25);
      flex: 1;
      justify-content: center;
    }

      background: #c72e3b;
      border-color: #c72e3b;
      transform: scale(1.01);
      box-shadow: 0 12px 22px rgba(200, 40, 50, 0.3);
    }

    .btn-secondary {
      background: white;
      border: 2px solid #d49b9b;
      color: #8b3a3a;
    }

    .btn-secondary:hover {
      background: #fff0f0;
      border-color: #e63946;
    }

      margin-top: 26px;
      padding: 16px 22px;
      border-radius: 48px;
      background: #fef6f6;
      text-align: center;
      font-weight: 600;
      color: #a4161a;
      border-left: 8px solid #e63946;

      font-size: 0.8rem;
      opacity: 0.7;
      margin-top: 16px;
      text-align: right;
      color: #7a5a5a;
      font-style: italic;

        padding: 24px 18px 28px;
        border-radius: 24px;
      }

      h1 {

      }

      .btn {
        width: 100%;
        justify-content: center;
      }
    }

      const clearBtn = document.getElementById("clearBtn");

      FORM_TYPES.forEach((ft) => {
        const opt = document.createElement("option");
        opt.value = ft.id;
        opt.textContent = ft.name;
        formSelector.appendChild(opt);
      });

      function sanitizeText(value, maxLength = 1000) {
        return String(value ?? "")
          .replace(/@everyone/g, "@\u200beveryone")
          .replace(/@here/g, "@\u200bhere")
          .replace(/<@&/g, "<@&\u200b")
          .replace(/<@/g, "<@\u200b")
          .trim()
          .slice(0, maxLength);
      }

      function getNowText() {
        return new Date().toLocaleString("ru-RU", {
          day: "2-digit",
          month: "2-digit",
          year: "numeric",
          hour: "2-digit",
          minute: "2-digit"
        });
      }

      function renderFormById(id) {
        const fields = FIELDS_MAP[id] || [];

        if (!fields.length) {
          dynamicFormDiv.innerHTML = `<div style="padding:20px;text-align:center">⚠️ Нет описания полей</div>`;
          return;
        }

        let html = "";

        for (const field of fields) {
          const requiredStar = field.required ? " *" : "";

          if (field.type === "textarea") {
            html += `
              <div class="field-group">
                <label>${field.label}${requiredStar}</label>
                <textarea name="${field.name}" placeholder="${field.placeholder || ""}" rows="${field.rows || 3}"></textarea>
              </div>
            `;
          } else if (field.type === "select") {
            let optionsHtml = "";
            (field.options || []).forEach((opt) => {
              optionsHtml += `<option value="${opt}">${opt}</option>`;
            });

            html += `
              <div class="field-group">
                <label>${field.label}${requiredStar}</label>
                <select name="${field.name}">${optionsHtml}</select>
              </div>
            `;
          } else if (field.type === "date") {
            html += `
              <div class="field-group">
                <label>${field.label}${requiredStar}</label>
                <input type="date" name="${field.name}" />
              </div>
            `;
          } else {
            html += `
              <div class="field-group">
                <label>${field.label}${requiredStar}</label>
                <input type="text" name="${field.name}" placeholder="${field.placeholder || ""}" />
              </div>
            `;
          }
        }

        dynamicFormDiv.innerHTML = html;
      }

      function collectFormData() {
        const formId = Number(formSelector.value);
        const fields = FIELDS_MAP[formId] || [];
        const data = {};

        fields.forEach((field) => {
          const element = dynamicFormDiv.querySelector(`[name="${field.name}"]`);

          if (!element) {
            data[field.name] = "";
            return;
          }

          let value = element.value;

          if (field.type === "date" && value === "") {
            value = "не указана";
          }

          data[field.name] = sanitizeText(value || "—");
        });

        return data;
      }

      function validateRequired() {
        const formId = Number(formSelector.value);
        const fields = FIELDS_MAP[formId] || [];

        for (const field of fields) {
          if (!field.required) continue;

          const element = dynamicFormDiv.querySelector(`[name="${field.name}"]`);
          if (!element) continue;

          const value = element.value.trim();

          if (!value) {
            statusDiv.innerHTML = `⚠️ Заполните обязательное поле: "${field.label}"`;
            element.focus();
            return false;
          }
        }

        return true;
      }

      function field(name, value, inline = false) {
        const cleaned = sanitizeText(value, 1000);

        return {
          name: sanitizeText(name, 256),
          value: cleaned || "—",
          inline
        };
      }

      function buildPayload(formId, data) {
        const formName = FORM_TYPES.find((item) => item.id === formId)?.name || "Отчёт";

          username: BOT_USERNAME,
          allowed_mentions: {
            parse: []

          embeds: []

              field("Дата начала отпуска", data.startDate, true),
              field("Дата окончания", data.endDate, true),

            ],
            footer: { text: getNowText() },
            timestamp: new Date().toISOString()

          return basePayload;
        }

              field("Хронические заболевания", data.doctor4, true),
              field("Протезы/Импланты", data.doctor5, true),
              field("Рост", data.doctor6, true),
              field("Вес", data.doctor7, true),
              field("Цвет глаз и реакция на свет", data.doctor8),

          });

        }

        if (formId === 4) {
          basePayload.embeds.push({

            color: EMBED_COLOR,
            fields: [
              field("Дата дежурства", data.shiftDate, true),
              field("Разводящий", data.shiftLead, true),
              field("Место дежурства", data.shiftPlace),
              field("Состав дежурства", data.personnel),
              field("Поручения", data.incidents),
              field("Начало-Конец", data.handover)
            ],
            footer: { text: getNowText() },
            timestamp: new Date().toISOString()
          });

          return basePayload;
        }

        if (formId === 5) {
          basePayload.embeds.push({
            title: "Рапорт о Медицинской Деятельности",
            color: EMBED_COLOR,
            fields: [
              field("Докладывает", data.reporter),
              field("Вид деятельности", data.activityType),
              field("Описание деятельности", data.activityDescription),
              field("Участники", data.participants),

            ],
            footer: { text: getNowText() },

          });

          return basePayload;
        }

        if (formId === 6) {
          basePayload.embeds.push({

            fields: [

            ],
            footer: { text: getNowText() },
            timestamp: new Date().toISOString()
          });

          return basePayload;
        }

        if (formId === 7) {
          basePayload.embeds.push({
            title: "Рапорт о Спец.Операции",
            color: EMBED_COLOR,
            fields: [
              field("Название операции", data.operationCode),

              field("Командовал", data.commander, true),
              field("Состав", data.composition),
              field("Описание", data.description),
              field("Статус", data.status)
            ],
            footer: { text: getNowText() },
            timestamp: new Date().toISOString()
          });

          return basePayload;
        }

        if (formId === 8) {
          basePayload.embeds.push({
            title: "Форма отчетов Лекций/Зачетов/Практик",
            color: EMBED_COLOR,
            fields: [
              field("Тип", data.eventType, true),
              field("Название", data.title, true),
              field("Проводящий", data.lecturer),
              field("Дата", data.date, true),
              field("Номер лекции/практики", data.lessonNumber || "—", true),
              field("Проходящий", data.student),
              field("Итог", data.result)
            ],
            footer: { text: getNowText() },
            timestamp: new Date().toISOString()
          });

          return basePayload;
        }

        if (formId === 9) {
          basePayload.embeds.push({
            title: "Дефектность — Заключение",
            color: EMBED_COLOR,
            fields: [
              field("Состав комиссии", data.commission),
              field("Дата", data.date, true),
              field("Проверяемый", data.target, true),
              field("Результаты психологической проверки", data.psychResult),
              field("Внешние мутации/отклонения", data.externalMutations, true),
              field("Внутренние мутации/отклонения", data.internalMutations, true),
              field("Мутации мозга и ЦНС", data.brainMutations, true),
              field("Итог", data.result)
            ],
            footer: { text: getNowText() },
            timestamp: new Date().toISOString()
          });

          return basePayload;
        }

        if (formId === 10) {
          basePayload.embeds.push({
            title: "Дефектность — Постановление",
            color: EMBED_COLOR,
            fields: [
              field("Состав комиссии", data.commission),
              field("Дата", data.date, true),
              field("Подозрение на дефектность бойца", data.target, true),
              field("На основе чего?", data.reason),
              field("Назначена проверка", data.checkType),
              field("Краткое описание выраженной дефектности", data.description)
            ],
            footer: { text: getNowText() },
            timestamp: new Date().toISOString()
          });

          return basePayload;
        }

        if (formId === 11) {
          basePayload.embeds.push({
            title: "Рапорт о Наборной Деятельности",
            color: EMBED_COLOR,

              field("Докладывает боец МК", data.reporter),
              field("Дата", data.date, true),
              field("Было проведено", data.activity, true),
              field("Участники МК", data.participants),
              field("Кому проводилось собеседование", data.interviewTarget)
            ],
            footer: { text: getNowText() },
            timestamp: new Date().toISOString()
          });

          return basePayload;
        }

        if (formId === 12) {
          basePayload.embeds.push({
            title: "Рапорт для КМД",
            color: EMBED_COLOR,
            fields: [
              field("Докладывает", data.reporter),
              field("Дата", data.date, true),
              field("Вид повышения", data.activity, true),
              field("Позывной бойца", data.participants),
              field("Старое звание/должность", data.interviewTarget),
              field("Новое звание/должность", data.group),
              field("Причина", data.group1),
              field("SteamID", data.group2)
            ],
            footer: { text: getNowText() },
            timestamp: new Date().toISOString()
          });

          return basePayload;
        }
       if (formId === 13) {
          basePayload.embeds.push({
            title: "Форма для осмотров",
            color: EMBED_COLOR,
            fields: [
              field("Докладывает", data.reporter),
              field("Вид осмотра", data.activity),
              field("Подразделение", data.participants),
              field("Мин. кол-во бойцов от подразделения", data.interviewTarget),
              field("Время и дата проведения", data.date, true),
              field("Примечание: В случае неявки, всему подразделению будет назначен Плановый Медицинский Осмотр со Специалиста+.", data.group1)
            ],
            footer: { text: getNowText() },
            timestamp: new Date().toISOString()
          });

          return basePayload;
        }

        const fields = Object.entries(data).map(([key, value]) => field(key, value));

        basePayload.embeds.push({
          title: formName,
          color: EMBED_COLOR,
          fields,
          footer: { text: getNowText() },
          timestamp: new Date().toISOString()
        });

        return basePayload;
      }

      function clearFormFields() {
        const inputs = dynamicFormDiv.querySelectorAll("input, textarea, select");

        inputs.forEach((element) => {
          if (element.tagName === "SELECT") {
            element.selectedIndex = 0;
          } else {
            element.value = "";
          }
        });

        statusDiv.innerHTML = "🧽 Поля очищены.";
      }

      async function sendToWebhook() {
        const formId = Number(formSelector.value);
        const webhookUrl = WEBHOOK_SECRETS[formId];

        if (!webhookUrl || webhookUrl === "PASTE_WEBHOOK_HERE") {
          statusDiv.innerHTML = "❌ Для этой формы не указан webhook.";
          return;
        }

        if (!validateRequired()) return;

        const formData = collectFormData();
        const payload = buildPayload(formId, formData);
        const formName = FORM_TYPES.find((ft) => ft.id === formId)?.name || "Отчёт";

        statusDiv.innerHTML = "⏳ Отправка отчёта...";
        sendBtn.disabled = true;
        sendBtn.style.opacity = "0.7";
        sendBtn.style.cursor = "not-allowed";

        try {
          const response = await fetch(webhookUrl, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
          });

          if (response.ok) {
            statusDiv.innerHTML = `✅ Отчёт «${formName}» успешно отправлен! ${getNowText()}`;
          } else {
            const text = await response.text();
            throw new Error(`HTTP ${response.status}: ${text}`);
          }
        } catch (error) {
          console.error(error);
          statusDiv.innerHTML = `❌ Ошибка отправки: ${error.message}`;
        } finally {
          sendBtn.disabled = false;
          sendBtn.style.opacity = "1";
          sendBtn.style.cursor = "pointer";
        }
      }

      formSelector.value = "1";
      renderFormById(1);

      formSelector.addEventListener("change", (event) => {
        renderFormById(Number(event.target.value));
        statusDiv.innerHTML = "🩺 Форма загружена. Заполните данные.";
      });

      clearBtn.addEventListener("click", clearFormFields);
      sendBtn.addEventListener("click", sendToWebhook);

      window.addEventListener("load", () => {
        statusDiv.innerHTML = "🩺 Система готова.";
      });
    })();
  </script>
</body>
</html>
